<div class="grid grid-cols-12 gap-2 items-end bg-slate-50 p-4 rounded-lg border border-slate-100 mb-4 animate-in fade-in duration-300">
    <div class="col-span-5">
        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">内容 / 品目</label>
        <input type="text" name="item_desc" placeholder="例: システム開発費用" required
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-400 focus:border-slate-400 text-sm">
    </div>
    <div class="col-span-1">
        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">数量</label>
        <input type="number" name="item_qty" value="1" min="1" required
               class="w-full px-2 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-400 focus:border-slate-400 text-center text-sm">
    </div>
    <div class="col-span-2">
        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">単価 (円)</label>
        <input type="text" name="item_price" placeholder="0" required
               oninput="formatCurrencyInput(this)"
               class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-400 focus:border-slate-400 text-right font-mono text-sm">
    </div>
    <div class="col-span-2">
        <label class="block text-[10px] font-bold text-slate-400 uppercase mb-1">税率</label>
        <select name="item_tax" class="w-full px-2 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-400 focus:border-slate-400 text-sm bg-white">
            <option value="10" selected>10%</option>
            <option value="8">8% (軽)</option>
            <option value="0">非課税</option>
        </select>
    </div>
    <div class="col-span-1 flex justify-center pb-2">
        <button type="button" 
                onclick="const row = this.closest('.grid'); row.remove(); document.getElementById('invoice-form').dispatchEvent(new Event('change', { bubbles: true }));" 
                class="text-slate-300 hover:text-red-500 transition-colors"
                title="この行を削除">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" />
            </svg>
        </button>
    </div>
</div>

<script>
    if (typeof formatCurrencyInput !== 'function') {
        window.formatCurrencyInput = function(input) {
            let value = input.value.replace(/[^\d]/g, '');
            if (value === '') {
                input.value = '';
                return;
            }
            input.value = Number(value).toLocaleString();
        };
    }
</script>
