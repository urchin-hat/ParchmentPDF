<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nami-Seikyu - 波請求</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://yubinbango.github.io/yubinbango/yubinbango.js" charset="UTF-8"></script>
    <style>
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline-block; }
        
        /* プレビューエリアのスクロール */
        .preview-sticky {
            position: sticky;
            top: 1.5rem;
            max-height: calc(100vh - 3rem);
            overflow-y: auto;
        }

        /* 印刷風の影 */
        #invoice-preview-container {
            box-shadow: 0 0 30px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-900 font-sans min-h-screen">
    <header class="bg-white border-b border-slate-200 py-4 shadow-sm mb-6">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <span>🌊</span> Nami-Seikyu <span class="text-sm font-normal text-slate-400 ml-2">波請求 v2.2</span>
            </h1>
            <div class="text-xs text-slate-400">
                Smooth as the Ocean
            </div>
        </div>
    </header>

    <main class="container mx-auto px-4 pb-12">
        <div class="grid grid-cols-1 xl:grid-cols-2 gap-8 items-start">
            
            <!-- 左カラム: 入力フォーム -->
            <div class="space-y-6">
                <form id="invoice-form" action="/generate" method="POST" class="h-adr"
                      hx-post="/preview" hx-target="#preview-area" 
                      hx-trigger="load, change delay:200ms, keyup delay:500ms from:input, keyup delay:500ms from:textarea">
                    
                    <span class="p-country-name" style="display:none;">Japan</span>

                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 space-y-6">
                        <h2 class="text-lg font-bold text-slate-700 border-b pb-2">基本情報</h2>
                        
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label for="invoice_number" class="block text-xs font-semibold text-slate-500 uppercase mb-1">請求書番号</label>
                                <input type="text" name="invoice_number" id="invoice_number" value="{{ default_invoice_no }}" required
                                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all">
                            </div>
                            <div>
                                <label for="issue_date" class="block text-xs font-semibold text-slate-500 uppercase mb-1">発行日</label>
                                <input type="date" name="issue_date" id="issue_date" value="{{ today }}" required
                                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all">
                            </div>
                        </div>

                        <div>
                            <label for="payment_deadline" class="block text-xs font-semibold text-slate-500 uppercase mb-1">支払期限 (任意)</label>
                            <input type="date" name="payment_deadline" id="payment_deadline"
                                   class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all">
                        </div>

                        <div class="space-y-4 pt-2 border-t border-slate-100">
                            <h2 class="text-sm font-bold text-slate-500 pb-1">宛先情報 (To)</h2>
                            <div class="grid grid-cols-4 gap-4">
                                <div class="col-span-1">
                                    <label for="client_postal_code" class="block text-xs font-semibold text-slate-500 uppercase mb-1">郵便番号</label>
                                    <div class="flex gap-2">
                                        <input type="text" name="client_postal_code" id="client_postal_code" placeholder="1234567"
                                               class="p-postal-code w-full px-2 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all font-mono text-sm">
                                        <button type="button" onclick="lookupAddress('client')"
                                                class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded text-[10px] font-bold transition-colors whitespace-nowrap">
                                            住所検索
                                        </button>
                                    </div>
                                </div>
                                <div class="col-span-3">
                                    <label for="client_address" class="block text-xs font-semibold text-slate-500 uppercase mb-1">請求先 住所</label>
                                    <input type="text" name="client_address" id="client_address" placeholder="例: 東京都千代田区宛先町2-2-2"
                                           class="p-region p-locality p-street-address p-extended-address w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all text-sm">
                                </div>
                            </div>
                            <div class="grid grid-cols-2 gap-4">
                                <div>
                                    <label for="client_name" class="block text-xs font-semibold text-slate-500 uppercase mb-1">請求先 会社/組織名</label>
                                    <input type="text" name="client_name" id="client_name" placeholder="例: お得意様株式会社" required
                                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all">
                                </div>
                                <div>
                                    <label for="client_contact_person" class="block text-xs font-semibold text-slate-500 uppercase mb-1">担当者名 (任意)</label>
                                    <input type="text" name="client_contact_person" id="client_contact_person" placeholder="例: 田中 太郎 様"
                                           class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all">
                                </div>
                            </div>
                        </div>

                        <div class="space-y-4 pt-2 border-t border-slate-100">
                            <h2 class="text-sm font-bold text-slate-500 pb-1">発行者情報 (From)</h2>
                            <div>
                                <label for="issuer_name" class="block text-xs font-semibold text-slate-500 uppercase mb-1">発行者名</label>
                                <input type="text" name="issuer_name" id="issuer_name" placeholder="例: 波請求株式会社" required
                                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all font-bold">
                            </div>
                            <div class="grid grid-cols-4 gap-4">
                                <div class="col-span-1">
                                    <label for="issuer_postal_code" class="block text-xs font-semibold text-slate-500 uppercase mb-1">郵便番号</label>
                                    <div class="flex gap-2">
                                        <input type="text" name="issuer_postal_code" id="issuer_postal_code" placeholder="1000001"
                                               class="p-postal-code w-full px-2 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all font-mono text-sm">
                                        <button type="button" onclick="lookupAddress('issuer')"
                                                class="bg-slate-100 hover:bg-slate-200 text-slate-600 px-2 py-1 rounded text-[10px] font-bold transition-colors whitespace-nowrap">
                                            住所検索
                                        </button>
                                    </div>
                                </div>
                                <div class="col-span-3">
                                    <label for="issuer_address" class="block text-xs font-semibold text-slate-500 uppercase mb-1">発行者 住所</label>
                                    <input type="text" name="issuer_address" id="issuer_address" placeholder="例: 東京都千代田区1-1-1"
                                           class="p-region p-locality p-street-address p-extended-address w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all text-sm">
                                </div>
                            </div>
                            <div>
                                <label for="seal_text" class="block text-xs font-semibold text-slate-500 uppercase mb-1">印影テキスト (任意)</label>
                                <input type="text" name="seal_text" id="seal_text" placeholder="例: 代表之印"
                                       class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all">
                            </div>
                        </div>

                        <div class="space-y-4 pt-2">
                            <h2 class="text-sm font-bold text-slate-500 border-b border-slate-100 pb-1">振込先・備考</h2>
                            <div>
                                <label for="bank_info" class="block text-xs font-semibold text-slate-500 uppercase mb-1">振込先口座情報</label>
                                <textarea name="bank_info" id="bank_info" placeholder="例: 波々銀行 大波支店 普通 1234567&#13;&#10;口座名義: ナミセイキュウ（カ"
                                          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all font-mono text-sm" rows="2"></textarea>
                            </div>
                            <div>
                                <label for="notes" class="block text-xs font-semibold text-slate-500 uppercase mb-1">備考 / 特記事項</label>
                                <textarea name="notes" id="notes" placeholder="例: 振込手数料は貴社にてご負担願います。"
                                          class="w-full px-3 py-2 border border-slate-300 rounded-md focus:ring-2 focus:ring-slate-800 focus:border-slate-800 transition-all text-sm" rows="2"></textarea>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200 mt-6">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-lg font-bold text-slate-700">請求明細</h2>
                            <button type="button" id="add-item-button"
                                    hx-get="/add-item" 
                                    hx-target="#items-container" 
                                    hx-swap="beforeend"
                                    class="text-sm bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-1.5 rounded-lg font-medium transition-colors flex items-center gap-2">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="12 4v16m8-8H4" />
                                </svg>
                                行を追加
                            </button>
                        </div>

                        <div id="items-container">
                            {% include "fragments/item_row.html" %}
                        </div>
                    </div>

                    <div class="mt-8 flex gap-4">
                        <button type="button" id="download-pdf-button" onclick="if(document.getElementById('invoice-form').reportValidity()) { document.getElementById('invoice-form').submit(); }"
                                class="flex-1 bg-slate-800 text-white py-4 px-6 rounded-xl font-bold text-lg hover:bg-slate-700 transition-all shadow-lg flex items-center justify-center gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="4 16v1a2 2 0 002 2h12a2 2 0 002-2v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                            </svg>
                            PDFをダウンロード
                        </button>
                    </div>
                </form>
            </div>

            <!-- 右カラム: ライブプレビュー -->
            <div class="preview-sticky">
                <div class="flex items-center justify-between mb-4 px-2">
                    <span class="text-xs font-bold text-slate-400 uppercase tracking-widest flex items-center gap-2">
                        <span class="relative flex h-2 w-2">
                            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span>
                        </span>
                        Live Preview
                    </span>
                    <div class="htmx-indicator text-xs text-slate-400 animate-pulse">更新中...</div>
                </div>
                <div id="preview-area" class="origin-top transition-all duration-300">
                    <div class="bg-white p-20 shadow-sm border border-slate-200 rounded-xl text-center text-slate-300">
                        読み込み中...
                    </div>
                </div>
            </div>

        </div>
    </main>

    <footer class="mt-auto py-12 border-t border-slate-200 text-center">
        <div class="container mx-auto px-4">
            <p class="text-slate-400 text-sm font-medium uppercase tracking-widest">
                Nami-Seikyu - 波請求
            </p>
        </div>
    </footer>
    <script>
        function lookupAddress(type) {
            const postalInput = document.getElementById(type + '_postal_code');
            const addressInput = document.getElementById(type + '_address');
            const postalCode = postalInput.value.replace(/[^\d]/g, '');
            
            if (postalCode.length < 7) {
                alert('郵便番号を7桁で入力してください。');
                return;
            }

            // YubinBango.Core を手動で呼び出す
            new YubinBango.Core(postalCode, function(addr) {
                if (addr.region && addr.locality) {
                    const fullAddress = addr.region + addr.locality + addr.street + addr.extended;
                    addressInput.value = fullAddress;
                    
                    // HTMX に変更を通知してプレビューを更新
                    addressInput.dispatchEvent(new Event('input', { bubbles: true }));
                    addressInput.dispatchEvent(new Event('change', { bubbles: true }));
                } else {
                    alert('該当する住所が見つかりませんでした。');
                }
            });
        }
    </script>
</body>
</html>
